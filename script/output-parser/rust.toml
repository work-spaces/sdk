# Rust Compiler Output Parser Rules
#
# This TOML file defines patterns for parsing rustc/cargo output into structured
# diagnostics with actionable hints.

[parser]
source = "rustc"
fail_on = "error"
format = "human"
dedup = true
strip_ansi = true

# ============================================================================
# Rules
# ============================================================================

# Primary error pattern - captures error code and message
[[rule]]
tag = "rust-error"
pattern = '^error\[(?P<code>E\d+)\]: (?P<message>.*)$'
severity = "error"
help = "Rust compiler error. Check the error code documentation for specific guidance."

# Primary error pattern without code
[[rule]]
tag = "rust-error-no-code"
pattern = '^error: (?P<message>.*)$'
severity = "error"
help = "Rust compiler error. Review the error message for details."

# Location attachment for errors
[[rule]]
tag = "rust-location"
pattern = '^\s*--> (?P<file>[^:]+):(?P<line>\d+):(?P<column>\d+)$'
attach_to = "rust-error"
help = "Location information for the error. Navigate to this file and line to fix the issue."

# Location attachment for no-code errors
[[rule]]
tag = "rust-location-no-code"
pattern = '^\s*--> (?P<file>[^:]+):(?P<line>\d+):(?P<column>\d+)$'
attach_to = "rust-error-no-code"
help = "Location information for the error. Navigate to this file and line to fix the issue."

# Primary warning pattern
[[rule]]
tag = "rust-warning"
pattern = '^warning: (?P<message>.*)$'
severity = "warning"
help = "Rust compiler warning. Address this to improve code quality and prevent potential issues."

# Warning location attachment
[[rule]]
tag = "rust-warning-location"
pattern = '^\s*--> (?P<file>[^:]+):(?P<line>\d+):(?P<column>\d+)$'
attach_to = "rust-warning"
help = "Location information for the warning. Navigate to this file and line to address the issue."

# Note diagnostics
[[rule]]
tag = "rust-note"
pattern = '^\s*= note: (?P<message>.*)$'
severity = "note"
help = "Additional context from the compiler. This provides helpful information about the diagnostic."

# Help diagnostics
[[rule]]
tag = "rust-help"
pattern = '^\s*= help: (?P<message>.*)$'
severity = "hint"
help = "Compiler suggestion for fixing the issue. Follow this guidance to resolve the diagnostic."
